        <h2>Biology Notes</h2>

                                 <div class="card">



    <h3>Cell Division</h3>
    <p>
        Cell division is the process by which a parent cell divides into two or more daughter cells.
        There are two main types: mitosis and meiosis.
        Mitosis produces identical cells for growth and repair, while meiosis produces sex cells (gametes).
    </p>

    <h3>Reproduction in Living Things</h3>
    <p>
        Reproduction is the process of producing new organisms.
        It can be sexual or asexual.
        Sexual reproduction involves two parents and leads to genetic variation.
        Asexual reproduction involves one parent and produces identical offspring.
    </p>

    <h3>Human Reproductive System</h3>
    <p>
        The human reproductive system is responsible for producing offspring.
        In males, testes produce sperm cells.
        In females, ovaries produce egg cells (ova).
        Fertilization occurs when sperm and egg meet.
    </p>

    <h3>Genetics and Heredity</h3>
    <p>
        Genetics is the study of how traits are passed from parents to offspring.
        Genes are located on chromosomes and determine characteristics such as eye color and height.
        Dominant genes express themselves over recessive genes.
    </p>

    <h3>Classification of Living Things</h3>
    <p>
        Living organisms are classified into groups based on similarities.
        The main groups are kingdom, phylum, class, order, family, genus, and species.
        This system is called taxonomy.
    </p>

    <h3>Ecology and Ecosystems</h3>
    <p>
        Ecology is the study of how living things interact with each other and their environment.
        An ecosystem includes both living organisms and non-living factors like water, air, and soil.
    </p>

    <h3>Food Chains and Food Webs</h3>
    <p>
        A food chain shows the flow of energy from one organism to another.
        It starts with producers (plants), followed by consumers and decomposers.
        A food web is a network of interconnected food chains.
    </p>

    <h3>Adaptation</h3>
    <p>
        Adaptation is the process by which organisms develop features that help them survive in their environment.
        For example, camels have humps to store fat in desert conditions.
    </p>

        <h3>Force</h3>
        <p>
            Force is a push or pull that can change the state of motion of an object.
            The SI unit of force is Newton (N).
        </p>

        <h3>Energy</h3>
        <p>
            Energy is the ability to do work.
            Common forms include kinetic energy and potential energy.
        </p>

        <h3>Acids and Bases</h3>
        <p>
            Acids release hydrogen ions in water while bases release hydroxide ions.
            When acids and bases react, they form salt and water.
        </p>

        <h3>Periodic Table</h3>
        <p>
            The periodic table organizes elements based on atomic number and properties.
            Elements in the same group have similar chemical properties.
        </p>

<script>

function searchNotes(){

    let input = document.getElementById("searchBox").value.toLowerCase();
    let notes = document.getElementsByClassName("noteItem");

    let found = false;

    for(let i = 0; i < notes.length; i++){

        let text = notes[i].innerText.toLowerCase();

        if(text.includes(input)){
            notes[i].style.display = "block";
            found = true;
        } else {
            notes[i].style.display = "none";
        }
    }

    // If nothing found
    if(!found){
        alert("No results found for: " + input);
    }
}

</script>
